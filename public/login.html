<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Agente IA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --green: #00ff88;
    --green-dim: #00ff8822;
    --red: #ff4560;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --accent: #7c6aff;
    --accent-dim: #7c6aff22;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  /* grid de fundo */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.3;
    pointer-events: none;
  }

  /* brilho de fundo */
  body::after {
    content: '';
    position: fixed;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, #7c6aff18 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
    box-shadow: 0 24px 80px #00000080, 0 0 0 1px #ffffff08;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 36px;
  }

  .brand-icon {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .brand-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.15rem;
    letter-spacing: -0.02em;
  }

  .brand-sub {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 1px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 32px;
    line-height: 1.5;
  }

  .field {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  input::placeholder { color: var(--muted); }

  .btn-login {
    width: 100%;
    margin-top: 8px;
    padding: 14px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.88rem;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }

  .btn-login:hover { opacity: 0.88; }
  .btn-login:active { transform: scale(0.98); }
  .btn-login:disabled { opacity: 0.45; cursor: default; }

  .btn-login .spinner {
    display: none;
    width: 16px;
    height: 16px;
    border: 2px solid #ffffff55;
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }

  .btn-login.loading .label { display: none; }
  .btn-login.loading .spinner { display: block; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    margin-top: 14px;
    padding: 10px 14px;
    background: #ff456015;
    border: 1px solid var(--red);
    border-radius: 8px;
    font-size: 0.72rem;
    color: var(--red);
    display: none;
  }

  .error-msg.show { display: block; }

  .footer-note {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-size: 0.62rem;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
  }

  @media (max-width: 480px) {
    .card {
      padding: 36px 24px;
      border-radius: 16px;
    }
    h1 { font-size: 1.35rem; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="brand">
    <div class="brand-icon">🤖</div>
    <div>
      <div class="brand-text">Agente IA</div>
      <div class="brand-sub">WhatsApp Automation</div>
    </div>
  </div>

  <h1>Bem-vindo</h1>
  <p class="subtitle">Entre com suas credenciais para acessar o dashboard.</p>

  <form id="login-form" onsubmit="doLogin(event)">
    <div class="field">
      <label>Usuário</label>
      <input type="text" id="username" placeholder="seu usuário" autocomplete="username" required>
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>

    <button class="btn-login" type="submit" id="login-btn">
      <span class="label">Entrar</span>
      <div class="spinner"></div>
    </button>

    <div class="error-msg" id="error-msg">Usuário ou senha incorretos.</div>
  </form>

  <div class="footer-note">
    Acesso restrito — apenas usuários autorizados.
  </div>
</div>

<script>
  // Se já tem token válido, vai direto pro dashboard
  if (localStorage.getItem('auth_token')) {
    fetch('/api/status', {
      headers: { Authorization: 'Bearer ' + localStorage.getItem('auth_token') }
    }).then(r => { if (r.ok) window.location.href = '/'; });
  }

  async function doLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('error-msg');

    btn.classList.add('loading');
    btn.disabled = true;
    err.classList.remove('show');

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (res.ok && data.token) {
        localStorage.setItem('auth_token', data.token);
        window.location.href = '/';
      } else {
        err.textContent = data.error || 'Usuário ou senha incorretos.';
        err.classList.add('show');
      }
    } catch {
      err.textContent = 'Erro de conexão. Tente novamente.';
      err.classList.add('show');
    }

    btn.classList.remove('loading');
    btn.disabled = false;
  }
</script>

</body>
</html>
